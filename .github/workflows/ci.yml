name: CI

on:
  push:
    branches: ['master', '001-sms-ai-coaching']
  pull_request:
    branches: ['master']

jobs:
  backend:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: kiba_test
          POSTGRES_USER: kiba
          POSTGRES_PASSWORD: kiba_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test
        env:
          NODE_ENV: test

      - name: Run database migrations
        run: npm run migration:run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://kiba:kiba_test@localhost:5432/kiba_test

      - name: Contract tests
        run: npm run test:contract
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://kiba:kiba_test@localhost:5432/kiba_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://kiba:kiba_test@localhost:5432/kiba_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          SENDBLUE_API_KEY_ID: ${{ secrets.SENDBLUE_API_KEY_ID }}
          SENDBLUE_API_SECRET_KEY: ${{ secrets.SENDBLUE_API_SECRET_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CRISIS_COACH_ALERT_EMAIL: test@kiba.ai
          CRISIS_COACH_ALERT_PHONE: '+15550009999'
          SESSION_TIMEOUT_HOURS: '1'
          APP_BASE_URL: http://localhost:3000
          FRONTEND_URL: http://localhost:3001
          STRIPE_PRICE_ID_INDIVIDUAL: price_test_placeholder
          INTERNAL_API_KEY: test_internal_key_for_ci_use_only_32chars

  frontend:
    name: Frontend — Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/v1
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

  verify-deployment:
    name: Verify Live Deployments
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Wait for Render to deploy (90s)
        run: sleep 90

      - name: Check backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kiba-1.onrender.com/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Backend health: OK ($STATUS)"

      - name: Check CORS allows PATCH
        run: |
          METHODS=$(curl -s -X OPTIONS https://kiba-1.onrender.com/v1/admin/users/x/status \
            -H "Origin: https://kiba-blond.vercel.app" \
            -H "Access-Control-Request-Method: PATCH" \
            -D - 2>&1 | grep -i "access-control-allow-methods" | tr -d '\r')
          echo "CORS methods: $METHODS"
          if echo "$METHODS" | grep -q "PATCH"; then
            echo "CORS PATCH: OK"
          else
            echo "WARNING: PATCH not in CORS — Render may still be deploying"
          fi

      - name: Check new endpoints exist
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://kiba-1.onrender.com/v1/onboarding/check-phone?phone=%2B15550001234")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ]; then
            echo "check-phone endpoint: OK ($STATUS)"
          else
            echo "check-phone endpoint missing: HTTP $STATUS — Render may not have deployed yet"
          fi
